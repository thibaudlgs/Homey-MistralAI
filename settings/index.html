<!doctype html>
<html>
  <head>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
        color: #333;
        margin: 20px;
      }
      .field {
        margin-bottom: 20px;
      }
      .label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background-color: #FD6520;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #e55a1d;
      }
      #status {
        margin-top: 10px;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="field">
      <label class="label" data-i18n="app.settings.api_key.title">API Key</label>
      <input id="api_key" type="password" placeholder="Mistral API Key" autocomplete="off" />
      <p style="font-size: 0.8em; color: #666;" data-i18n="app.settings.api_key.description">Get yours at <a href="https://console.mistral.ai/" target="_blank">console.mistral.ai</a></p>
    </div>
    <div class="field">
      <label class="label" data-i18n="app.settings.system_prompt.title">System Prompt</label>
      <textarea id="system_prompt" rows="4" style="width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;" placeholder="You are a helpful assistant integrated in a smart home system (Homey Pro). Be concise."></textarea>
      <p style="font-size: 0.8em; color: #666;" data-i18n="app.settings.system_prompt.description">Default system instruction for the AI.</p>
    </div>
    <button id="save" data-i18n="app.settings.save">Save changes</button>
    <div id="status"></div>

    <script type="text/javascript">
      function onHomeyReady(Homey) {
        const apiKeyEl = document.getElementById('api_key');
        const systemPromptEl = document.getElementById('system_prompt');
        const saveEl = document.getElementById('save');
        const statusEl = document.getElementById('status');

        Homey.get('api_key', function(err, value) {
          if (err) return Homey.alert(err);
          apiKeyEl.value = value || '';
        });
        
        Homey.get('system_prompt', function(err, value) {
          if (!err && value) {
            systemPromptEl.value = value;
          }
        });

        saveEl.addEventListener('click', function() {
          Homey.set('api_key', apiKeyEl.value, function(err) {
            if (err) {
              statusEl.innerText = 'Error: ' + err.message;
              statusEl.style.color = 'red';
              return;
            }
            Homey.set('system_prompt', systemPromptEl.value, function(err2) {
              if (err2) {
                statusEl.innerText = 'Error: ' + err2.message;
                statusEl.style.color = 'red';
              } else {
                statusEl.innerText = 'Settings saved!';
                statusEl.style.color = 'green';
                setTimeout(function() {
                  statusEl.innerText = '';
                }, 3000);
              }
            });
          });
        });
        
        Homey.ready();
      }
    </script>
  </body>
</html>
